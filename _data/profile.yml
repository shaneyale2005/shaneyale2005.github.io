short_bio: >-
  <p>Welcome to my academic homepage. I am Xinye Zheng, from Cangzhou, Hebei Province, China.</p>

  <p>Currently, I am an undergraduate student majoring in Computer Science and Technology at Hefei University of Technology,
  where I am a member of
  <a href="https://vut-hfut.github.io/index.html" target="_blank">Lab for Media Computing</a> 
  under the supervision of 
  <a href="https://faculty.hfut.edu.cn/weiyanyan/zh_CN/index/450269/list/index.htm" target="_blank">Lecturer Yanyan Wei (韦炎炎讲师)</a> 
  and 
  <a href="https://www.hfut.edu.cn/info/1154/10846.htm" target="_blank">Prof. Meng Wang (汪萌教授)</a>.</p>


  <p>Starting in 2027, I will join
  <a href="https://ustc.fmclab.cn/home/" target="_blank">Future Media Computing Lab</a> 
  at University of Science and Technology of China, advised by 
  <a href="https://faculty.ustc.edu.cn/yangxun/zh_CN/index/599242/list/index.htm" target="_blank">Prof. Xun Yang (杨勋教授)</a>. 
  My external co-advisor will be Associate Research Fellow
  <a href="https://scholar.google.com/citations?hl=zh-CN&user=sdqv6pQAAAAJ&view_op=list_works" target="_blank">Fei Wang (王飞副研究员)</a>. 
  </p>

  <p>My research interests primarily lie in Affective Computing, 3D Reconstruction, and AI for Science, with the following specific focuses:</p>
  <ul>
    <li>Multimodal Large Language Models for Affective Computing</li>
    <li>3D Vision and Computer Graphics</li>
    <li>AI for Science, such as AI for Psychology and AI for Biology</li>
  </ul>

  <p>Beyond academia, I enjoy mountaineering, hiking, and landscape photography.</p>


